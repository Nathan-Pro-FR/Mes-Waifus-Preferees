<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Découvrez My Waifu Sanctuary, une collection interactive et animée de mes personnages préférés issus d'animés et de jeux vidéo.">
    
    <title>My Waifu Sanctuary 🌟</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Animation du dégradé de couleurs qui bouge sur le titre */
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animation de flottaison (haut/bas) pour le titre */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-sanctuary {
            background: linear-gradient(
                270deg, 
                #f472b6, #a78bfa, #818cf8, #f472b6
            );
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: 
                gradient-move 6s ease infinite, 
                float 3s ease-in-out infinite;
            display: inline-block;
        }

        /* Animation d'apparition globale au chargement */
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .header-load {
            animation: fade-in 1s ease-out;
        }

        /* Halo lumineux rose discret derrière la carte au survol */
        .card-glow:hover {
            box-shadow: 0 0 30px 5px rgba(236, 72, 153, 0.2);
        }

        /* Conteneur parent de l'image : on force l'isolation du rendu */
        .img-container {
            position: relative;
            overflow: hidden;
            border-radius: 2rem 2rem 0 0;
            transform: translateZ(0);
            mask-image: -webkit-radial-gradient(white, black);
        }

        /* Style de l'image par défaut */
        .group img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transform: scale(1);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
        }

        /* Effet d'animation quand la souris survole la carte */
        .group:hover img {
            transform: scale(1.06);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="py-20 text-center border-b border-slate-900 bg-slate-900/40 backdrop-blur-md header-load">
        <h1 class="text-6xl font-black tracking-tighter sm:text-7xl">
            <span class="animate-sanctuary">My Waifu Sanctuary 🚀</span>
        </h1>
        <p class="mt-6 text-slate-400 max-w-xl mx-auto text-lg font-medium opacity-80">
            Une collection interactive animée avec <span class="text-pink-400">Tailwind CSS</span> & <span class="text-purple-400">VanillaTilt</span>.
        </p>
    </header>

    <section class="max-w-4xl mx-auto px-6 mt-12 header-load">
        <div class="bg-slate-900/60 border border-slate-800/80 rounded-3xl p-8 backdrop-blur-sm shadow-xl">
            <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400 mb-6 flex items-center gap-2">
                📊 Répartition du Sanctuaire (<span id="total-waifus">0</span> Waifus)
            </h2>
            <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div id="waifu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <footer class="text-center py-12 text-sm text-slate-400 border-t border-slate-900/50 mt-20">
        Propulsé par l'amour des animés et du code propre ✨
    </footer>

    <script src="waifus_data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <script>
        const grid = document.getElementById('waifu-grid');
        const statsContainer = document.getElementById('stats-container');
        const totalWaifusSpan = document.getElementById('total-waifus');
        
        const totalWaifus = WAIFUS_DATA.length;
        totalWaifusSpan.textContent = totalWaifus;

        // Configuration des filtres de statistiques automatiques
        const categoriesConfig = [
            { id: "pokemon", label: "Pokémon 🐾", color: "from-amber-400 to-orange-500", check: w => w.anime === "Pokémon" },
            { id: "genshin", label: "Genshin Impact ⚔️", color: "from-yellow-400 to-amber-500", check: w => w.anime === "Genshin Impact" },
            { id: "valorant", label: "Valorant 🎯", color: "from-red-400 to-rose-600", check: w => w.anime === "Valorant" },
            { id: "mignon", label: "Mignon / Chill ✨", color: "from-pink-400 to-purple-500", check: w => w.tags.includes("Mignon") || w.tags.includes("Chill") },
            { id: "yandere-tsundere", label: "Tsundere / Yandere 🖤", color: "from-fuchsia-500 to-red-600", check: w => w.tags.includes("Tsundere") || w.tags.includes("Yandere") || w.tags.includes("Obsessionnelle") },
            { id: "furry-creature", label: "Furry / Créatures 🦊", color: "from-emerald-400 to-teal-500", check: w => w.tags.includes("Louve") || w.tags.includes("Renard") || w.tags.includes("Semi-Humaine") || w.anime === "Pokémon" }
        ];

        // Calcul et affichage automatique des statistiques
        categoriesConfig.forEach(cat => {
            const count = WAIFUS_DATA.filter(cat.check).length;
            const percentage = totalWaifus > 0 ? Math.round((count / totalWaifus) * 100) : 0;

            const statBarHTML = `
                <div class="space-y-2">
                    <div class="flex justify-between text-sm font-semibold">
                        <span class="text-slate-300">${cat.label}</span>
                        <span class="text-slate-400">${count} (${percentage}%)</span>
                    </div>
                    <div class="w-full bg-slate-950 rounded-full h-3 overflow-hidden border border-slate-800">
                        <div class="bg-gradient-to-r ${cat.color} h-full rounded-full transition-all duration-1000 ease-out" 
                             style="width: 0%;" data-target-width="${percentage}%">
                        </div>
                    </div>
                </div>
            `;
            statsContainer.innerHTML += statBarHTML;
        });

        // Construction dynamique des cartes de personnages
        WAIFUS_DATA.forEach(waifu => {
            const tagsHTML = waifu.tags.map(tag => 
                `<span class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-300 font-bold border border-slate-700/50">${tag}</span>`
            ).join('');

            // On va chercher dynamiquement la couleur unique dans la configuration centrale
            const licenceStyle = LICENCES_CONFIG[waifu.anime] 
                ? LICENCES_CONFIG[waifu.anime].style 
                : "border-slate-500 text-slate-400 bg-slate-900/40";

            const cardHTML = `
                <div class="card-glow group bg-slate-900/80 border border-slate-800 rounded-[2rem] overflow-hidden shadow-2xl transition-all duration-500 ease-out hover:border-pink-500/50" 
                     data-tilt data-tilt-max="6" data-tilt-speed="800" data-tilt-glare data-tilt-max-glare="0.15">
                    
                    <div class="h-80 img-container">
                        <img src="${waifu.image}" alt="Illustration de ${waifu.nom}">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/90 via-transparent to-transparent"></div>
                        
                        <span class="absolute top-5 right-5 text-[10px] font-black uppercase tracking-[0.15em] px-4 py-1.5 rounded-full border backdrop-blur-md shadow-lg ${licenceStyle}">
                            ${waifu.anime}
                        </span>
                    </div>
                    
                    <div class="p-8 relative">
                        <h2 class="text-3xl font-black text-white group-hover:text-pink-300 transition-colors duration-300 tracking-tight">
                            ${waifu.nom}
                        </h2>
                        <p class="mt-4 text-slate-400 leading-relaxed text-sm font-medium min-h-[80px]">
                            ${waifu.description}
                        </p>
                        
                        <div class="mt-6 flex flex-wrap gap-2">
                            ${tagsHTML}
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        });

        // Activation de l'effet de inclinaison 3D VanillaTilt
        VanillaTilt.init(document.querySelectorAll("[data-tilt]"));

        // Lancement de l'animation de chargement des barres de statistiques
        setTimeout(() => {
            document.querySelectorAll('[data-target-width]').forEach(bar => {
                bar.style.width = bar.getAttribute('data-target-width');
            });
        }, 300);
    </script>
</body>
</html>
